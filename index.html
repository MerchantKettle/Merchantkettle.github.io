<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Goodies of morning dearr</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ===== SKY ===== */
  #scene {
    position: relative;
    width: 100vw; height: 100vh;
    background: #0c1a3a;
    transition: background 5s ease;
  }
  #scene.dawn  { background: #1c2f5e; }
  #scene.rise  { background: linear-gradient(to bottom, #0d2a6e 0%, #b34a14 55%, #f5a623 100%); }
  #scene.day   { background: linear-gradient(to bottom, #1a6fa8 0%, #5bc0f5 55%, #f7d98b 100%); }

  /* ===== STARS ===== */
  #stars {
    position: absolute; inset: 0;
    pointer-events: none;
    transition: opacity 3s ease 1s;
  }
  #stars.fade { opacity: 0; }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff;
    animation: twinkle var(--dur, 2s) ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: .2; } to { opacity: 1; } }

  /* ===== SUN ===== */
  #sun-wrap {
    position: absolute;
    /* horizontally centred on the mountain peak (≈50% x), vertically just below peak */
    left: 50%; bottom: 36vh;
    transform: translateX(-50%) translateY(160px);
    transition: transform 5s cubic-bezier(.16,1,.3,1), opacity 1.5s ease;
    opacity: 0;
    z-index: 2;
  }
  #sun-wrap.risen {
    transform: translateX(-50%) translateY(-80px);
    opacity: 1;
  }
  #sun {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #fff9c4, #fdd835 35%, #fb8c00);
    box-shadow:
      0 0 0 18px rgba(253,216,53,.15),
      0 0 60px 30px rgba(253,216,53,.35),
      0 0 120px 60px rgba(251,140,0,.2);
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 0 18px rgba(253,216,53,.15), 0 0 60px 30px rgba(253,216,53,.35), 0 0 120px 60px rgba(251,140,0,.2); }
    50%      { box-shadow: 0 0 0 28px rgba(253,216,53,.2),  0 0 90px 45px rgba(253,216,53,.45), 0 0 160px 80px rgba(251,140,0,.3); }
  }
  /* rays container rotates; rays are static lines */
  #rays {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    opacity: 0;
    transition: opacity 1.5s ease 2.5s;
    animation: spinRays 20s linear infinite;
  }
  #sun-wrap.risen #rays { opacity: 1; }
  @keyframes spinRays { to { transform: rotate(360deg); } }
  .ray {
    position: absolute;
    width: 3px; height: 60px;
    background: linear-gradient(to top, rgba(255,220,80,.7), transparent);
    border-radius: 2px;
    transform-origin: 50% 100%;
    top: -60px; left: -1.5px;
  }

  /* ===== CLOUDS ===== */
  #clouds {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0; transition: opacity 3s ease 2s;
    z-index: 3;
  }
  #clouds.show { opacity: 1; }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,.82);
    border-radius: 100px;
    filter: blur(2px);
    animation: drift var(--spd,28s) linear infinite;
  }
  .cloud::before,.cloud::after {
    content:''; position:absolute;
    background:inherit; border-radius:50%;
  }
  /* cloud 1 */
  .cloud:nth-child(1){ width:130px;height:38px;top:14%;left:-160px;--spd:26s; }
  .cloud:nth-child(1)::before{ width:65px;height:55px;top:-30px;left:18px; }
  .cloud:nth-child(1)::after { width:50px;height:42px;top:-22px;left:55px; }
  /* cloud 2 */
  .cloud:nth-child(2){ width:95px;height:28px;top:22%;left:-130px;--spd:34s;animation-delay:-12s;opacity:.7; }
  .cloud:nth-child(2)::before{ width:48px;height:40px;top:-20px;left:12px; }
  .cloud:nth-child(2)::after { width:36px;height:30px;top:-14px;left:40px; }
  /* cloud 3 */
  .cloud:nth-child(3){ width:160px;height:44px;top:8%;left:-200px;--spd:40s;animation-delay:-6s;opacity:.65; }
  .cloud:nth-child(3)::before{ width:80px;height:64px;top:-34px;left:22px; }
  .cloud:nth-child(3)::after { width:60px;height:50px;top:-24px;left:74px; }
  @keyframes drift { from{transform:translateX(0)} to{transform:translateX(calc(100vw + 220px))} }

  /* ===== BIRDS ===== */
  #birds {
    position: absolute; top: 20%; left: -120px;
    z-index: 4; opacity: 0; pointer-events: none;
  }
  #birds.fly {
    opacity: 1;
    animation: birdFly 16s linear forwards;
  }
  @keyframes birdFly { to { transform: translateX(calc(100vw + 200px)); } }
  .bird {
    position: absolute;
    width: 20px; height: 7px;
    border-top: 2.5px solid rgba(30,30,60,.7);
    border-radius: 50% 50% 0 0;
    animation: flap .45s ease-in-out infinite alternate;
  }
  .bird::after {
    content:''; position:absolute; right:0; top:-2.5px;
    width:10px; height:7px;
    border-top:2.5px solid rgba(30,30,60,.7);
    border-radius:50% 50% 0 0;
  }
  @keyframes flap { from{transform:scaleY(1)} to{transform:scaleY(.35)} }
  .bird:nth-child(1){top:0;   left:0;   animation-delay:0s}
  .bird:nth-child(2){top:16px;left:30px;animation-delay:.12s}
  .bird:nth-child(3){top:4px; left:55px;animation-delay:.06s}
  .bird:nth-child(4){top:25px;left:78px;animation-delay:.18s}
  .bird:nth-child(5){top:-8px;left:98px;animation-delay:.09s}

  /* ===== MOUNTAIN SVG ===== */
  #mountain {
    position: absolute; bottom: 0; left: 0;
    width: 100%; z-index: 5;
    pointer-events: none;
  }

  /* ===== TITLE ===== */
  #title {
    position: absolute;
    top: 7%;
    width: 100%;
    text-align: center;
    z-index: 10;
    user-select: none;
  }
  #title h1 {
    font-size: clamp(3rem, 9vw, 7rem);
    font-weight: 300;
    letter-spacing: .25em;
    color: rgba(255,255,255,.92);
    text-shadow: 0 0 40px rgba(255,200,80,.4), 0 2px 20px rgba(0,0,0,.5);
    transition: color 4s ease, text-shadow 4s ease;
  }
  #scene.day #title h1 {
    color: rgba(255,255,255,1);
    text-shadow: 0 0 60px rgba(255,220,80,.6), 0 2px 12px rgba(0,50,120,.3);
  }
  #title .sub {
    display: block;
    font-size: clamp(.8rem, 2vw, 1.1rem);
    letter-spacing: .5em;
    color: rgba(255,255,255,.45);
    margin-top: 6px;
    text-transform: uppercase;
    transition: color 4s ease;
  }
  #scene.day .sub { color: rgba(255,255,255,.7); }

  /* ===== PLAY BUTTON ===== */
  #btn-wrap {
    position: absolute;
    bottom: 6%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  #play-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 42px;
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 60px;
    background: rgba(255,255,255,.07);
    backdrop-filter: blur(10px);
    color: rgba(255,255,255,.9);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: .18em;
    cursor: pointer;
    transition: background .3s, border-color .3s, transform .2s, box-shadow .3s;
  }
  #play-btn:hover {
    background: rgba(255,220,80,.18);
    border-color: rgba(255,220,80,.6);
    box-shadow: 0 0 30px rgba(255,200,60,.3);
    transform: translateY(-2px);
  }
  #play-btn:active { transform: translateY(0); }
  #play-btn.playing {
    background: rgba(255,200,60,.2);
    border-color: rgba(255,200,80,.7);
    box-shadow: 0 0 40px rgba(255,200,60,.4);
  }
  .btn-icon { font-size: 1.4rem; line-height: 1; }
  #hint {
    font-size: .78rem;
    letter-spacing: .3em;
    color: rgba(255,255,255,.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="scene">

  <!-- Stars -->
  <div id="stars"></div>

  <!-- Clouds -->
  <div id="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <!-- Sun -->
  <div id="sun-wrap">
    <div id="rays"></div>
    <div id="sun"></div>
  </div>

  <!-- Birds -->
  <div id="birds">
    <div class="bird"></div><div class="bird"></div><div class="bird"></div>
    <div class="bird"></div><div class="bird"></div>
  </div>

  <!-- Mountain -->
  <svg id="mountain" viewBox="0 0 1440 420" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
    <!-- distant ridge -->
    <polygon points="0,420 180,200 390,420"      fill="#1e2d5c" opacity=".6"/>
    <polygon points="260,420 500,140 740,420"     fill="#162348" opacity=".7"/>
    <polygon points="620,420 880,180 1100,420"    fill="#1e2d5c" opacity=".65"/>
    <polygon points="980,420 1220,160 1440,380 1440,420" fill="#162348" opacity=".6"/>
    <!-- main central mountain -->
    <polygon points="120,420 560,28 980,420"      fill="#0e1628"/>
    <!-- flanking peaks -->
    <polygon points="0,420 260,230 480,420"       fill="#111d36"/>
    <polygon points="940,420 1180,210 1440,420"   fill="#111d36"/>
    <!-- snow cap -->
    <polygon points="520,75 560,28 600,75 580,68 560,50 540,68" fill="rgba(255,255,255,.55)"/>
    <!-- subtle highlight edge left -->
    <polygon points="120,420 560,28 562,34 124,420" fill="rgba(255,255,255,.04)"/>
    <!-- ground fill -->
    <rect x="0" y="400" width="1440" height="20" fill="#0a1020"/>
  </svg>

  <!-- Title -->
  <div id="title">
    <h1>Goodies of morning dearrr/h1>
    <span class="sub">rise &amp; shine</span>
  </div>

  <!-- Button -->
  <div id="btn-wrap">
    <button id="play-btn" onclick="toggle()">
      <span class="btn-icon">☀️</span>
      <span id="btn-label">Play Music</span>
    </button>
    <span id="hint">click to greet the dawn</span>
  </div>

</div>

<script>
/* ── Stars ── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 180; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.4 + .5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*68}%;left:${Math.random()*100}%;opacity:${.2+Math.random()*.8};--dur:${1.4+Math.random()*2.2}s;animation-delay:${Math.random()*3}s`;
  starsEl.appendChild(s);
}

/* ── Rays ── */
const raysEl = document.getElementById('rays');
for (let i = 0; i < 12; i++) {
  const r = document.createElement('div');
  r.className = 'ray';
  r.style.transform = `rotate(${i*30}deg) translateY(-60px)`;
  // override the translateY within rotate context
  r.style.transformOrigin = '50% 100%';
  r.style.top = '-60px';
  r.style.transform = `rotate(${i*(360/12)}deg)`;
  // position each ray by rotating a wrapper div instead
  raysEl.appendChild(r);
}
// better approach: position rays absolutely around centre
raysEl.innerHTML = '';
for (let i = 0; i < 12; i++) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:absolute;top:0;left:0;width:0;height:0;transform:rotate(${i*30}deg)`;
  const r = document.createElement('div');
  r.className = 'ray';
  wrap.appendChild(r);
  raysEl.appendChild(wrap);
}

/* ── Audio ── */
let ctx = null, masterGain = null, oscs = [], playing = false, animated = false;

function buildMusic(ac) {
  masterGain = ac.createGain();
  masterGain.gain.setValueAtTime(0, ac.currentTime);
  masterGain.gain.linearRampToValueAtTime(.7, ac.currentTime + 3);
  masterGain.connect(ac.destination);

  const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99];
  const t0 = ac.currentTime;

  function note(freq, start, dur, vol=.35, type='sine') {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t0+start);
    g.gain.linearRampToValueAtTime(vol, t0+start+.12);
    g.gain.exponentialRampToValueAtTime(.001, t0+start+dur);
    o.connect(g); g.connect(masterGain);
    o.start(t0+start); o.stop(t0+start+dur+.2);
    oscs.push(o);
  }

  // gentle repeating arpeggios over 60s
  for (let loop = 0; loop < 8; loop++) {
    const off = loop * 7;
    [[scale[0],0,3,.32],[scale[2],.6,2.4,.28],[scale[4],1.2,2,.30],
     [scale[5],1.8,2,.26],[scale[7],2.4,2.5,.28],[scale[4],3.4,2,.26],
     [scale[2],4.2,2.8,.28],[scale[0],5.2,3,.26]].forEach(([f,s,d,v]) => note(f, off+s, d, v));
    // low pad
    note(scale[0]/2, off, 7, .18, 'triangle');
    note(scale[2]/2, off+3.5, 3.5, .15, 'triangle');
  }
}

function fadeOut() {
  if (!masterGain) return;
  const now = ctx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setValueAtTime(masterGain.gain.value, now);
  masterGain.gain.linearRampToValueAtTime(0, now + 1.5);
  setTimeout(() => { oscs.forEach(o=>{ try{o.stop()}catch(e){} }); oscs=[]; }, 1600);
}

function toggle() {
  const btn = document.getElementById('play-btn');
  const label = document.getElementById('btn-label');
  const hint = document.getElementById('hint');

  if (playing) {
    playing = false;
    fadeOut();
    btn.classList.remove('playing');
    btn.querySelector('.btn-icon').textContent = '☀️';
    label.textContent = 'Play Music';
    hint.textContent = 'click to greet the dawn';
    return;
  }

  playing = true;
  btn.classList.add('playing');
  btn.querySelector('.btn-icon').textContent = '🎵';
  label.textContent = 'Pause';
  hint.textContent = 'the sun is rising…';

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  buildMusic(ctx);

  if (animated) return;
  animated = true;
  runAnimation();
}

function runAnimation() {
  const scene = document.getElementById('scene');
  const sunWrap = document.getElementById('sun-wrap');

  // t=0.3s — sky starts warming
  setTimeout(() => scene.classList.add('dawn'), 300);

  // t=1s — sun begins rising
  setTimeout(() => sunWrap.classList.add('risen'), 1000);

  // t=2s — full sunrise colours
  setTimeout(() => {
    scene.classList.remove('dawn');
    scene.classList.add('rise');
    document.getElementById('stars').classList.add('fade');
  }, 2000);

  // t=4s — clouds drift in
  setTimeout(() => document.getElementById('clouds').classList.add('show'), 4000);

  // t=5.5s — full day sky
  setTimeout(() => {
    scene.classList.remove('rise');
    scene.classList.add('day');
  }, 5500);

  // t=7s — birds fly across
  setTimeout(() => document.getElementById('birds').classList.add('fly'), 7000);

  // update hint
  setTimeout(() => {
    document.getElementById('hint').textContent = 'good morning ✨';
  }, 6000);
}
</script>
</body>
</html>
